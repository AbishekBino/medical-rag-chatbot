services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data/chroma_db:/app/data/chroma_db

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend